<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldPass — FIFA World Cup 2026 Tickets</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: { extend: {
    colors: { navy:'#003580', bright:'#0071c2', amber:'#ffb400', ink:'#1a1a2e', slate:'#5a5f6d', mist:'#f5f7fa' },
    fontFamily: { display:['Archivo','sans-serif'], body:['Inter','sans-serif'] }
  }}
}
</script>
<style>
  body{font-family:Inter,sans-serif;background:#f5f7fa;color:#1a1a2e}
  h1,h2,h3,.font-display{font-family:Archivo,sans-serif}
  .card-shadow{box-shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04)}
  .no-spin::-webkit-outer-spin-button,.no-spin::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  input:focus,select:focus{outline:2px solid #0071c2;outline-offset:1px}
  @media print{ .no-print{display:none!important} body{background:#fff} .print-full{box-shadow:none!important;border:1px solid #ddd} }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============================= DATA ============================= */
const VENUES = {
  nyc:{name:"MetLife Stadium", city:"New York / New Jersey", country:"USA", cap:82500, tz:"ET"},
  la:{name:"SoFi Stadium", city:"Los Angeles", country:"USA", cap:70240, tz:"PT"},
  dal:{name:"AT&T Stadium", city:"Dallas", country:"USA", cap:80000, tz:"CT"},
  atl:{name:"Mercedes-Benz Stadium", city:"Atlanta", country:"USA", cap:71000, tz:"ET"},
  hou:{name:"NRG Stadium", city:"Houston", country:"USA", cap:72220, tz:"CT"},
  kc:{name:"Arrowhead Stadium", city:"Kansas City", country:"USA", cap:76416, tz:"CT"},
  phi:{name:"Lincoln Financial Field", city:"Philadelphia", country:"USA", cap:69796, tz:"ET"},
  sf:{name:"Levi's Stadium", city:"San Francisco Bay Area", country:"USA", cap:68500, tz:"PT"},
  sea:{name:"Lumen Field", city:"Seattle", country:"USA", cap:69000, tz:"PT"},
  bos:{name:"Gillette Stadium", city:"Boston", country:"USA", cap:65878, tz:"ET"},
  mia:{name:"Hard Rock Stadium", city:"Miami", country:"USA", cap:64767, tz:"ET"},
  mex:{name:"Estadio Azteca", city:"Mexico City", country:"Mexico", cap:87523, tz:"CT"},
  gdl:{name:"Estadio Akron", city:"Guadalajara", country:"Mexico", cap:48071, tz:"CT"},
  mty:{name:"Estadio BBVA", city:"Monterrey", country:"Mexico", cap:53500, tz:"CT"},
  tor:{name:"BMO Field", city:"Toronto", country:"Canada", cap:45500, tz:"ET"},
  van:{name:"BC Place", city:"Vancouver", country:"Canada", cap:54500, tz:"PT"},
};

const STAGE_PRICE = {
  "Group":   {c1:210, c2:135, c3:85,  c4:60},
  "Round of 32":{c1:245, c2:160, c3:105, c4:75},
  "Round of 16":{c1:300, c2:200, c3:135, c4:95},
  "Quarter-final":{c1:445, c2:295, c3:195, c4:140},
  "Semi-final":{c1:675, c2:480, c3:335, c4:240},
  "Final":   {c1:1210, c2:895, c3:685, c4:440},
};

const T = (name,flag)=>({name,flag});
const matches = [
  {id:"M01", stage:"Group", group:"A", home:T("Mexico","🇲🇽"), away:T("Poland","🇵🇱"), venue:"mex", date:"2026-06-11", time:"20:00"},
  {id:"M02", stage:"Group", group:"B", home:T("Canada","🇨🇦"), away:T("Ecuador","🇪🇨"), venue:"tor", date:"2026-06-12", time:"18:00"},
  {id:"M03", stage:"Group", group:"D", home:T("USA","🇺🇸"), away:T("Wales","🏴󠁧󠁢󠁷󠁬󠁳󠁿"), venue:"la", date:"2026-06-12", time:"19:00"},
  {id:"M04", stage:"Group", group:"C", home:T("Argentina","🇦🇷"), away:T("Nigeria","🇳🇬"), venue:"mia", date:"2026-06-13", time:"16:00"},
  {id:"M05", stage:"Group", group:"E", home:T("France","🇫🇷"), away:T("Croatia","🇭🇷"), venue:"nyc", date:"2026-06-13", time:"21:00"},
  {id:"M06", stage:"Group", group:"F", home:T("Brazil","🇧🇷"), away:T("Japan","🇯🇵"), venue:"dal", date:"2026-06-14", time:"20:00"},
  {id:"M07", stage:"Group", group:"G", home:T("England","🏴󠁧󠁢󠁥󠁮󠁧󠁿"), away:T("Senegal","🇸🇳"), venue:"phi", date:"2026-06-14", time:"15:00"},
  {id:"M08", stage:"Group", group:"H", home:T("Spain","🇪🇸"), away:T("South Korea","🇰🇷"), venue:"sea", date:"2026-06-15", time:"18:00"},
  {id:"M09", stage:"Group", group:"A", home:T("Poland","🇵🇱"), away:T("Uruguay","🇺🇾"), venue:"hou", date:"2026-06-16", time:"17:00"},
  {id:"M10", stage:"Group", group:"C", home:T("Argentina","🇦🇷"), away:T("Netherlands","🇳🇱"), venue:"atl", date:"2026-06-18", time:"20:00"},
  {id:"M11", stage:"Group", group:"F", home:T("Brazil","🇧🇷"), away:T("Germany","🇩🇪"), venue:"kc", date:"2026-06-19", time:"19:00"},
  {id:"M12", stage:"Group", group:"E", home:T("France","🇫🇷"), away:T("Morocco","🇲🇦"), venue:"bos", date:"2026-06-20", time:"16:00"},
  {id:"M13", stage:"Group", group:"D", home:T("USA","🇺🇸"), away:T("Portugal","🇵🇹"), venue:"sf", date:"2026-06-22", time:"18:00"},
  {id:"M14", stage:"Group", group:"H", home:T("Spain","🇪🇸"), away:T("Belgium","🇧🇪"), venue:"gdl", date:"2026-06-24", time:"20:00"},
  {id:"M15", stage:"Round of 32", group:"", home:T("Winner A","🅰️"), away:T("3rd C/D/F","③"), venue:"mty", date:"2026-06-29", time:"19:00"},
  {id:"M16", stage:"Round of 32", group:"", home:T("Winner E","🅴"), away:T("Runner-up B","🅱️"), venue:"van", date:"2026-06-30", time:"16:00"},
  {id:"M17", stage:"Round of 16", group:"", home:T("Winner G1","🇺🇸"), away:T("Winner G2","🇧🇷"), venue:"dal", date:"2026-07-04", time:"20:00"},
  {id:"M18", stage:"Round of 16", group:"", home:T("Winner G3","🇦🇷"), away:T("Winner G4","🇫🇷"), venue:"nyc", date:"2026-07-05", time:"18:00"},
  {id:"M19", stage:"Quarter-final", group:"", home:T("QF1 Home","🇪🇸"), away:T("QF1 Away","🏴󠁧󠁢󠁥󠁮󠁧󠁿"), venue:"la", date:"2026-07-09", time:"19:00"},
  {id:"M20", stage:"Quarter-final", group:"", home:T("QF2 Home","🇧🇷"), away:T("QF2 Away","🇫🇷"), venue:"mia", date:"2026-07-11", time:"20:00"},
  {id:"M21", stage:"Semi-final", group:"", home:T("SF1 Home","🇦🇷"), away:T("SF1 Away","🇪🇸"), venue:"dal", date:"2026-07-14", time:"20:00"},
  {id:"M22", stage:"Semi-final", group:"", home:T("SF2 Home","🇧🇷"), away:T("SF2 Away","🇫🇷"), venue:"atl", date:"2026-07-15", time:"20:00"},
  {id:"M23", stage:"Final", group:"", home:T("Finalist 1","🏆"), away:T("Finalist 2","🏆"), venue:"nyc", date:"2026-07-19", time:"15:00"},
];

// deterministic pseudo-availability per match+category
function avail(id,cat){ let h=0; const s=id+cat; for(let i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))>>>0;} return 8 + h%140; }

/* ============================= STATE ============================= */
const state = {
  view:"list",           // list | detail | checkout | confirm | tickets
  matchId:null,
  filters:{ q:"", city:"", stage:"", sort:"date" },
  cart:null,             // {matchId,cat,qty}
  lastBooking:null,
};
const CATS = [
  {k:"c1", label:"Category 1", desc:"Prime central sideline, lower tier"},
  {k:"c2", label:"Category 2", desc:"Sideline & premium corners"},
  {k:"c3", label:"Category 3", desc:"Behind the goals, mid tier"},
  {k:"c4", label:"Category 4", desc:"Upper tier, restricted-value seats"},
];
const money = n => "$"+n.toLocaleString("en-US");
const fmtDate = d => new Date(d+"T00:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
const store = {
  read(){ try{return JSON.parse(localStorage.getItem("wp_bookings")||"[]")}catch(e){return[]} },
  add(b){ const a=this.read(); a.unshift(b); localStorage.setItem("wp_bookings",JSON.stringify(a)); },
};

/* ============================= HELPERS ============================= */
const $ = s => document.querySelector(s);
function go(view,extra={}){ Object.assign(state,extra,{view}); render(); window.scrollTo(0,0); }
function match(id){ return matches.find(m=>m.id===id); }
function pitchSVG(m){
  const v=VENUES[m.venue];
  return `<svg viewBox="0 0 320 180" class="w-full h-full" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
    <defs><linearGradient id="g${m.id}" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a6b3b"/><stop offset="1" stop-color="#0f8a4c"/></linearGradient></defs>
    <rect width="320" height="180" fill="url(#g${m.id})"/>
    ${[0,1,2,3,4,5].map(i=>`<rect x="${i*54}" width="27" height="180" fill="#ffffff" opacity="0.05"/>`).join("")}
    <rect x="20" y="20" width="280" height="140" fill="none" stroke="#fff" stroke-opacity=".5" stroke-width="2"/>
    <circle cx="160" cy="90" r="26" fill="none" stroke="#fff" stroke-opacity=".5" stroke-width="2"/>
    <line x1="160" y1="20" x2="160" y2="160" stroke="#fff" stroke-opacity=".5" stroke-width="2"/>
    <rect x="20" y="55" width="34" height="70" fill="none" stroke="#fff" stroke-opacity=".5" stroke-width="2"/>
    <rect x="266" y="55" width="34" height="70" fill="none" stroke="#fff" stroke-opacity=".5" stroke-width="2"/>
    <text x="160" y="98" text-anchor="middle" font-size="34">${m.home.flag} ${m.away.flag}</text>
  </svg>`;
}
function stageBadge(s){
  const c = s==="Final"?"bg-amber text-ink":s==="Group"?"bg-bright/10 text-bright":"bg-navy/10 text-navy";
  return `<span class="text-[11px] font-semibold px-2 py-0.5 rounded ${c}">${s}${s==="Group"?"":""}</span>`;
}

/* ============================= VIEWS ============================= */
function header(){
  return `<header class="no-print bg-navy text-white sticky top-0 z-40">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
      <button data-nav="list" class="flex items-center gap-2 font-display font-extrabold text-xl tracking-tight">
        <span class="text-amber">◆</span>World<span class="text-amber">Pass</span>
        <span class="ml-1 text-[10px] font-body font-semibold bg-white/15 px-1.5 py-0.5 rounded">FIFA WC 2026</span>
      </button>
      <nav class="flex items-center gap-1 text-sm font-medium">
        <button data-nav="list" class="px-3 py-2 rounded hover:bg-white/10">Matches</button>
        <button data-nav="tickets" class="px-3 py-2 rounded hover:bg-white/10">My Tickets</button>
      </nav>
    </div>
  </header>`;
}

function listView(){
  const f=state.filters;
  let rows = matches.filter(m=>{
    const v=VENUES[m.venue];
    const q=f.q.toLowerCase();
    const hitQ = !q || m.home.name.toLowerCase().includes(q)||m.away.name.toLowerCase().includes(q)||v.city.toLowerCase().includes(q)||v.name.toLowerCase().includes(q);
    return hitQ && (!f.city||m.venue===f.city) && (!f.stage||m.stage===f.stage);
  });
  rows.sort((a,b)=> f.sort==="price"
    ? STAGE_PRICE[a.stage].c4 - STAGE_PRICE[b.stage].c4
    : (a.date+a.time).localeCompare(b.date+b.time));

  const cityOpts = Object.entries(VENUES).map(([k,v])=>`<option value="${k}" ${f.city===k?"selected":""}>${v.city}</option>`).join("");
  const stageOpts = Object.keys(STAGE_PRICE).map(s=>`<option value="${s}" ${f.stage===s?"selected":""}>${s}</option>`).join("");

  return `
  <section class="bg-navy text-white no-print">
    <div class="max-w-6xl mx-auto px-4 pt-8 pb-14">
      <h1 class="font-display font-black text-3xl md:text-4xl leading-tight">Book your seat at the 2026 World Cup</h1>
      <p class="text-white/70 mt-2 max-w-xl">104 matches. 16 stadiums across the USA, Canada and Mexico. Find the match, pick your category, and get your QR ticket.</p>
    </div>
  </section>
  <div class="max-w-6xl mx-auto px-4 -mt-8 relative z-10 no-print">
    <div class="bg-white rounded-xl card-shadow p-3 grid grid-cols-1 md:grid-cols-12 gap-2 border border-amber/60">
      <input id="f-q" value="${f.q}" placeholder="Team, city or stadium" class="md:col-span-5 border border-gray-300 rounded-lg px-3 py-2.5 text-sm no-spin">
      <select id="f-city" class="md:col-span-3 border border-gray-300 rounded-lg px-3 py-2.5 text-sm"><option value="">All host cities</option>${cityOpts}</select>
      <select id="f-stage" class="md:col-span-2 border border-gray-300 rounded-lg px-3 py-2.5 text-sm"><option value="">All stages</option>${stageOpts}</select>
      <button id="f-go" class="md:col-span-2 bg-bright hover:bg-navy text-white font-semibold rounded-lg px-4 py-2.5 text-sm transition-colors">Search</button>
    </div>
  </div>

  <main class="max-w-6xl mx-auto px-4 py-6">
    <div class="flex items-center justify-between mb-3">
      <p class="text-sm text-slate"><span class="font-semibold text-ink">${rows.length}</span> matches available</p>
      <label class="text-sm text-slate flex items-center gap-2">Sort by
        <select id="f-sort" class="border border-gray-300 rounded-lg px-2 py-1.5 text-sm">
          <option value="date" ${f.sort==="date"?"selected":""}>Date</option>
          <option value="price" ${f.sort==="price"?"selected":""}>Price (low→high)</option>
        </select>
      </label>
    </div>
    <div class="space-y-3">${rows.map(matchRow).join("") || `<div class="text-center py-16 text-slate">No matches fit those filters. Clear a filter to see more.</div>`}</div>
  </main>`;
}

function matchRow(m){
  const v=VENUES[m.venue], from=STAGE_PRICE[m.stage].c4;
  return `<article class="bg-white rounded-xl card-shadow border border-gray-100 overflow-hidden md:flex hover:shadow-md transition-shadow">
    <div class="md:w-64 h-40 md:h-auto shrink-0 relative">${pitchSVG(m)}
      <div class="absolute top-2 left-2">${stageBadge(m.stage)}</div></div>
    <div class="flex-1 p-4 md:flex md:items-center md:justify-between gap-4">
      <div class="min-w-0">
        <div class="font-display font-extrabold text-lg text-ink">${m.home.flag} ${m.home.name} <span class="text-slate font-body font-normal text-sm">vs</span> ${m.away.name} ${m.away.flag}</div>
        <div class="text-sm text-slate mt-1">${m.group?`Group ${m.group} · `:""}${fmtDate(m.date)} · ${m.time} ${v.tz}</div>
        <div class="text-sm text-slate mt-0.5">📍 ${v.name} — ${v.city}, ${v.country}</div>
        <div class="text-xs text-slate mt-1">Capacity ${v.cap.toLocaleString()}</div>
      </div>
      <div class="mt-4 md:mt-0 md:text-right shrink-0 md:border-l md:pl-4 border-gray-100">
        <div class="text-xs text-slate">From</div>
        <div class="font-display font-extrabold text-2xl text-ink">${money(from)}</div>
        <button data-open="${m.id}" class="mt-2 w-full md:w-auto bg-amber hover:brightness-95 text-ink font-bold rounded-lg px-5 py-2.5 text-sm">View tickets</button>
      </div>
    </div>
  </article>`;
}

function detailView(){
  const m=match(state.matchId), v=VENUES[m.venue], p=STAGE_PRICE[m.stage];
  const c = state.cart&&state.cart.matchId===m.id ? state.cart : {matchId:m.id, cat:"c1", qty:1};
  const total = p[c.cat]*c.qty;
  return `<main class="max-w-6xl mx-auto px-4 py-6">
    <button data-nav="list" class="text-sm text-bright hover:underline mb-3 no-print">← All matches</button>
    <div class="grid lg:grid-cols-3 gap-6">
      <div class="lg:col-span-2 space-y-4">
        <div class="bg-white rounded-xl card-shadow overflow-hidden border border-gray-100">
          <div class="h-52 relative">${pitchSVG(m)}<div class="absolute top-3 left-3">${stageBadge(m.stage)}</div></div>
          <div class="p-5">
            <h1 class="font-display font-black text-2xl text-ink">${m.home.flag} ${m.home.name} vs ${m.away.name} ${m.away.flag}</h1>
            <p class="text-slate mt-1 text-sm">${m.group?`Group ${m.group} · `:""}${fmtDate(m.date)} · Kick-off ${m.time} ${v.tz}</p>
            <div class="grid grid-cols-3 gap-3 mt-4 text-sm">
              <div class="bg-mist rounded-lg p-3"><div class="text-slate text-xs">Stadium</div><div class="font-semibold">${v.name}</div></div>
              <div class="bg-mist rounded-lg p-3"><div class="text-slate text-xs">Location</div><div class="font-semibold">${v.city}, ${v.country}</div></div>
              <div class="bg-mist rounded-lg p-3"><div class="text-slate text-xs">Capacity</div><div class="font-semibold">${v.cap.toLocaleString()}</div></div>
            </div>
          </div>
        </div>
        <div class="bg-white rounded-xl card-shadow border border-gray-100 p-5">
          <h2 class="font-display font-bold text-lg mb-3">Choose a ticket category</h2>
          <div class="space-y-2">${CATS.map(cat=>{
            const a=avail(m.id,cat.k); const sel=c.cat===cat.k;
            return `<label class="flex items-center gap-3 border rounded-lg p-3 cursor-pointer ${sel?"border-bright bg-bright/5":"border-gray-200 hover:border-gray-300"}">
              <input type="radio" name="cat" value="${cat.k}" ${sel?"checked":""} class="accent-bright">
              <div class="flex-1">
                <div class="font-semibold text-ink">${cat.label} <span class="text-xs font-normal text-slate">· ${cat.desc}</span></div>
                <div class="text-xs ${a<20?"text-red-600":"text-emerald-600"} mt-0.5">${a<20?`Only ${a} left`:`${a} seats available`}</div>
              </div>
              <div class="font-display font-extrabold text-lg">${money(p[cat.k])}</div>
            </label>`;}).join("")}
          </div>
        </div>
      </div>

      <aside class="lg:col-span-1">
        <div class="bg-white rounded-xl card-shadow border border-gray-100 p-5 lg:sticky lg:top-20">
          <h3 class="font-display font-bold text-lg">Your order</h3>
          <div class="flex items-center justify-between mt-3 text-sm">
            <span class="text-slate">Category</span><span id="d-cat" class="font-semibold">${CATS.find(x=>x.k===c.cat).label}</span>
          </div>
          <div class="flex items-center justify-between mt-3">
            <span class="text-sm text-slate">Tickets</span>
            <div class="flex items-center gap-2">
              <button id="d-minus" class="w-8 h-8 rounded border border-gray-300 font-bold">−</button>
              <span id="d-qty" class="w-6 text-center font-semibold">${c.qty}</span>
              <button id="d-plus" class="w-8 h-8 rounded border border-gray-300 font-bold">+</button>
            </div>
          </div>
          <div class="border-t mt-4 pt-4 flex items-center justify-between">
            <span class="text-slate text-sm">Total</span>
            <span id="d-total" class="font-display font-black text-2xl text-ink">${money(total)}</span>
          </div>
          <p class="text-[11px] text-slate mt-1">Incl. taxes & service fees · max 4 per match</p>
          <button id="d-checkout" class="w-full mt-4 bg-amber hover:brightness-95 text-ink font-bold rounded-lg py-3">Reserve & checkout</button>
        </div>
      </aside>
    </div>
  </main>`;
}

function checkoutView(){
  const c=state.cart, m=match(c.matchId), p=STAGE_PRICE[m.stage], total=p[c.cat]*c.qty;
  return `<main class="max-w-4xl mx-auto px-4 py-6">
    <button data-open="${m.id}" class="text-sm text-bright hover:underline mb-3">← Back to tickets</button>
    <div class="grid md:grid-cols-3 gap-6">
      <div class="md:col-span-2 space-y-4">
        <div class="bg-white rounded-xl card-shadow border border-gray-100 p-5">
          <h2 class="font-display font-bold text-lg mb-4">Ticket holder</h2>
          <div class="grid sm:grid-cols-2 gap-3">
            <input id="c-first" placeholder="First name" class="border border-gray-300 rounded-lg px-3 py-2.5 text-sm">
            <input id="c-last" placeholder="Last name" class="border border-gray-300 rounded-lg px-3 py-2.5 text-sm">
            <input id="c-email" type="email" placeholder="Email for tickets" class="border border-gray-300 rounded-lg px-3 py-2.5 text-sm sm:col-span-2">
            <input id="c-country" placeholder="Country of residence" class="border border-gray-300 rounded-lg px-3 py-2.5 text-sm sm:col-span-2">
          </div>
        </div>
        <div class="bg-white rounded-xl card-shadow border border-gray-100 p-5">
          <h2 class="font-display font-bold text-lg mb-1">Payment</h2>
          <p class="text-[11px] text-slate mb-4">Demo checkout — no real card is charged. Do not enter real card details.</p>
          <div class="grid sm:grid-cols-2 gap-3">
            <input id="c-card" inputmode="numeric" placeholder="Card number" class="border border-gray-300 rounded-lg px-3 py-2.5 text-sm sm:col-span-2 no-spin">
            <input id="c-exp" placeholder="MM/YY" class="border border-gray-300 rounded-lg px-3 py-2.5 text-sm">
            <input id="c-cvc" inputmode="numeric" placeholder="CVC" class="border border-gray-300 rounded-lg px-3 py-2.5 text-sm no-spin">
          </div>
          <p id="c-error" class="text-sm text-red-600 mt-3 hidden"></p>
        </div>
      </div>
      <aside class="md:col-span-1">
        <div class="bg-white rounded-xl card-shadow border border-gray-100 p-5 md:sticky md:top-20">
          <h3 class="font-display font-bold">Summary</h3>
          <div class="mt-3 text-sm">
            <div class="font-semibold">${m.home.flag} ${m.home.name} vs ${m.away.name} ${m.away.flag}</div>
            <div class="text-slate text-xs mt-1">${fmtDate(m.date)} · ${m.time} · ${VENUES[m.venue].city}</div>
          </div>
          <div class="border-t mt-3 pt-3 space-y-1 text-sm">
            <div class="flex justify-between"><span class="text-slate">${CATS.find(x=>x.k===c.cat).label} × ${c.qty}</span><span>${money(p[c.cat]*c.qty)}</span></div>
            <div class="flex justify-between text-slate text-xs"><span>Taxes & fees</span><span>included</span></div>
          </div>
          <div class="border-t mt-3 pt-3 flex justify-between items-center">
            <span class="text-slate text-sm">Total</span><span class="font-display font-black text-2xl">${money(total)}</span>
          </div>
          <button id="c-pay" class="w-full mt-4 bg-amber hover:brightness-95 text-ink font-bold rounded-lg py-3">Pay ${money(total)}</button>
        </div>
      </aside>
    </div>
  </main>`;
}

function ticketCard(b,full){
  const m=b.match, v=b.venue;
  return `<div class="bg-white rounded-xl card-shadow border border-gray-100 overflow-hidden ${full?"print-full":""}">
    <div class="bg-navy text-white p-4 flex items-center justify-between">
      <div><div class="font-display font-extrabold">${m.home.flag} ${m.home.name} vs ${m.away.name} ${m.away.flag}</div>
        <div class="text-white/70 text-xs mt-0.5">${b.stage} · ${fmtDate(m.date)} · ${m.time} ${v.tz}</div></div>
      ${stageBadge(b.stage)}
    </div>
    <div class="p-5 flex gap-5 items-center">
      <div id="qr-${b.ref}" class="shrink-0 bg-white p-1 border rounded"></div>
      <div class="text-sm space-y-1 min-w-0">
        <div><span class="text-slate">Stadium</span> · <span class="font-semibold">${v.name}, ${v.city}</span></div>
        <div><span class="text-slate">Category</span> · <span class="font-semibold">${b.catLabel}</span></div>
        <div><span class="text-slate">Tickets</span> · <span class="font-semibold">${b.qty}</span></div>
        <div><span class="text-slate">Holder</span> · <span class="font-semibold">${b.name}</span></div>
        <div class="pt-1"><span class="text-slate">Booking ref</span> · <span class="font-mono font-bold tracking-wider">${b.ref}</span></div>
        <div class="text-slate">Total paid · <span class="font-semibold text-ink">${money(b.total)}</span></div>
      </div>
    </div>
  </div>`;
}

function confirmView(){
  const b=state.lastBooking;
  return `<main class="max-w-2xl mx-auto px-4 py-8">
    <div class="text-center mb-6 no-print">
      <div class="w-14 h-14 rounded-full bg-emerald-100 text-emerald-600 grid place-items-center mx-auto text-2xl">✓</div>
      <h1 class="font-display font-black text-2xl mt-3">Booking confirmed</h1>
      <p class="text-slate text-sm mt-1">Tickets sent to ${b.email}. Present the QR code at the gate.</p>
    </div>
    ${ticketCard(b,true)}
    <div class="flex gap-3 mt-5 no-print">
      <button onclick="window.print()" class="flex-1 border border-gray-300 rounded-lg py-2.5 font-semibold hover:bg-mist">Print / save PDF</button>
      <button data-nav="tickets" class="flex-1 bg-bright text-white rounded-lg py-2.5 font-semibold hover:bg-navy">My Tickets</button>
      <button data-nav="list" class="flex-1 bg-amber text-ink rounded-lg py-2.5 font-bold">Book another</button>
    </div>
  </main>`;
}

function ticketsView(){
  const bs=store.read();
  return `<main class="max-w-2xl mx-auto px-4 py-6">
    <h1 class="font-display font-black text-2xl mb-4">My Tickets</h1>
    ${bs.length? `<div class="space-y-4">${bs.map(b=>ticketCard(b,false)).join("")}</div>`
      : `<div class="bg-white rounded-xl border border-gray-100 card-shadow p-12 text-center text-slate">
           No tickets yet. <button data-nav="list" class="text-bright font-semibold hover:underline">Browse matches</button> to book your first.</div>`}
  </main>`;
}

/* ============================= RENDER + EVENTS ============================= */
function render(){
  let body;
  if(state.view==="list") body=listView();
  else if(state.view==="detail") body=detailView();
  else if(state.view==="checkout") body=checkoutView();
  else if(state.view==="confirm") body=confirmView();
  else body=ticketsView();
  $("#app").innerHTML = header()+body+`<footer class="no-print max-w-6xl mx-auto px-4 py-8 text-center text-xs text-slate">WorldPass — demo prototype. Not affiliated with FIFA. Sample fixtures & prices.</footer>`;
  drawQRs();
  wire();
}

function drawQRs(){
  const targets = state.view==="confirm" ? [state.lastBooking] : state.view==="tickets" ? store.read() : [];
  targets.forEach(b=>{
    const el=document.getElementById("qr-"+b.ref); if(!el) return;
    el.innerHTML="";
    new QRCode(el,{ text:JSON.stringify({ref:b.ref,m:b.match.id,cat:b.cat,qty:b.qty}), width:104, height:104, correctLevel:QRCode.CorrectLevel.M });
  });
}

function wire(){
  document.querySelectorAll("[data-nav]").forEach(b=>b.onclick=()=>go(b.dataset.nav));
  document.querySelectorAll("[data-open]").forEach(b=>b.onclick=()=>go("detail",{matchId:b.dataset.open, cart:null}));

  if(state.view==="list"){
    const apply=()=>{ state.filters={ q:$("#f-q").value, city:$("#f-city").value, stage:$("#f-stage").value, sort:$("#f-sort")?.value||state.filters.sort }; render(); };
    $("#f-go").onclick=apply;
    $("#f-q").onkeydown=e=>{ if(e.key==="Enter") apply(); };
    ["f-city","f-stage","f-sort"].forEach(id=>{ const el=$("#"+id); if(el) el.onchange=apply; });
  }

  if(state.view==="detail"){
    const m=match(state.matchId), p=STAGE_PRICE[m.stage];
    if(!state.cart||state.cart.matchId!==m.id) state.cart={matchId:m.id,cat:"c1",qty:1};
    const c=state.cart;
    const refresh=()=>{ $("#d-cat").textContent=CATS.find(x=>x.k===c.cat).label; $("#d-qty").textContent=c.qty; $("#d-total").textContent=money(p[c.cat]*c.qty); };
    document.querySelectorAll('input[name="cat"]').forEach(r=>r.onchange=()=>{ c.cat=r.value; refresh(); });
    $("#d-plus").onclick=()=>{ c.qty=Math.min(4,c.qty+1); refresh(); };
    $("#d-minus").onclick=()=>{ c.qty=Math.max(1,c.qty-1); refresh(); };
    $("#d-checkout").onclick=()=>go("checkout");
  }

  if(state.view==="checkout") $("#c-pay").onclick=pay;
}

function pay(){
  const g=id=>$("#"+id).value.trim();
  const first=g("c-first"),last=g("c-last"),email=g("c-email"),country=g("c-country");
  const card=g("c-card").replace(/\s/g,""),exp=g("c-exp"),cvc=g("c-cvc");
  const err=$("#c-error");
  const fail=msg=>{ err.textContent=msg; err.classList.remove("hidden"); };
  if(!first||!last) return fail("Enter the ticket holder's first and last name.");
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) return fail("Enter a valid email so we can send the tickets.");
  if(!country) return fail("Enter your country of residence.");
  if(!/^\d{13,19}$/.test(card)) return fail("Enter a valid card number (demo — use any 13–19 digits).");
  if(!/^\d{2}\/\d{2}$/.test(exp)) return fail("Enter expiry as MM/YY.");
  if(!/^\d{3,4}$/.test(cvc)) return fail("Enter a 3–4 digit CVC.");

  const c=state.cart, m=match(c.matchId), p=STAGE_PRICE[m.stage];
  const ref="WP-"+Math.random().toString(36).slice(2,8).toUpperCase();
  const booking={ ref, match:m, venue:VENUES[m.venue], stage:m.stage, cat:c.cat,
    catLabel:CATS.find(x=>x.k===c.cat).label, qty:c.qty, total:p[c.cat]*c.qty,
    name:`${first} ${last}`, email, createdAt:Date.now() };
  store.add(booking);
  state.lastBooking=booking; state.cart=null;
  go("confirm");
}

render();
</script>
</body>
</html>
